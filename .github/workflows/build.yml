name: KiCad Project Build and Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    name: KiCad Project Build and Validation
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Install KiCad and Dependencies
      run: |
        sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build kicad kicad-libraries
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - run: pip install frugy
    - name: Build and Validate KiCad Project
      run: |
        pushd ${{github.workspace}}
        PROJECT_DIRS=$(ls -d */ | sed 's:/*$::')
        popd
        for DIR in $PROJECT_DIRS; do
          if [ ! -f "${{github.workspace}}/$DIR/CMakeLists.txt" ]; then
            echo "Skipping directory: $DIR (no CMakeLists.txt)"
            continue
          fi
          echo "Processing directory: $DIR"
          pushd ${{github.workspace}}/$DIR
          cmake -B ./build -G Ninja
          cmake --build ./build --target erc
          cmake --build ./build --target drc
          cmake --build ./build --target production
          cmake --build ./build --target pdf
          popd
        done
